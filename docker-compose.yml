# docker-compose.yml at the repo root
services:
  postgres:
    image: postgres:16
    container_name: snake-arena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"     # localhost only, not exposed
    volumes:
      - ./pg-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: snake-arena-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"     # localhost only

  runner:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    command: ["test-match", "--sim-image", "snake-sim"]
    cgroup: host
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      # Where the bundler writes match bundles; served by the file-server.
      ORCHESTRATOR_ARTIFACTS_DIR: /artifacts
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - ./sim-artifacts:/artifacts
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  file-server:
    image: nginx:alpine
    container_name: snake-arena-files
    restart: unless-stopped
    volumes:
      - ./sim-artifacts:/srv/files:ro
      - ./nginx-files.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:8081:80"

# sim-artifacts is a bind mount (./sim-artifacts) — no named volume needed
