# docker-compose.yml at the repo root
services:
  postgres:
    image: postgres:16
    container_name: snake-arena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"     # localhost only, not exposed
    volumes:
      - ./pg-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: snake-arena-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"     # localhost only

  runner:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    command: ["test-match", "--sim-image", "snake-sim"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      ORCHESTRATOR_ARTIFACTS_DIR: /artifacts
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sim-artifacts:/artifacts
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  builder:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    command: ["build"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  sim-artifacts:
