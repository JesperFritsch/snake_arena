# docker-compose.yml at the repo root
#
# Bundle storage:
#   Orchestrator services PUT/GET bundles over HTTP to the file-server
#   (nginx WebDAV at /upload/). No shared volume needed between services.
#   The file-server owns /srv/files and serves it as static files.
#
# Env vars are declared explicitly per service — there are no in-code
# defaults left for anything that should be operator-configurable, so the
# contract is fully visible here. See .env for what comes from the host.

x-vol-docker-sock: &vol-docker-sock /var/run/docker.sock:/var/run/docker.sock
x-vol-cgroup:      &vol-cgroup      /sys/fs/cgroup:/sys/fs/cgroup:ro

# Env shared by every orchestrator daemon (match/test-match/scorer/scheduler).
x-orchestrator-env: &orchestrator-env
  LOG_LEVEL:    INFO
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

# Env for services that talk to the bundler (match/test-match/scorer).
# REPLAY_HOST is required by the factory; orchestrator daemons never call
# .url() so an empty string is fine.
x-bundler-env: &bundler-env
  BUNDLER_BACKEND:   http
  BUNDLE_UPLOAD_URL: http://file-server/upload
  BUNDLE_READ_URL:   http://file-server
  REPLAY_HOST:       ""

services:
  postgres:
    image: postgres:16
    container_name: snake-arena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./pg-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: snake-arena-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"

  # Runs test matches triggered by users in the browser.
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    command: ["test-match", "--sim-image", "snake-sim"]
    cgroup: host
    environment:
      <<: [*orchestrator-env, *bundler-env]
      REDIS_URL:                redis://redis:6379
      BUILDER_REGISTRY_PREFIX:  snake
      BUILDER_BUILD_TIMEOUT_S:  "60"
      SANDBOX_IMAGES_DIR:       /app/sandbox-images
    volumes:
      - *vol-docker-sock
      - *vol-cgroup
    depends_on:
      - postgres
      - redis
      - file-server
    restart: unless-stopped

  # Runs ranked multiplayer matches enqueued by the scheduler.
  match-runner:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    command: ["match", "--sim-image", "snake-sim"]
    cgroup: host
    environment:
      <<: [*orchestrator-env, *bundler-env]
    volumes:
      - *vol-docker-sock
      - *vol-cgroup
    depends_on:
      - postgres
      - file-server
    restart: unless-stopped

  # Reads completed ranked match bundles and writes scores into match_participants.
  scorer:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    command: ["scorer"]
    environment:
      <<: [*orchestrator-env, *bundler-env]
    depends_on:
      - postgres
      - file-server
    restart: unless-stopped

  # Enqueues ranked match jobs for submitted agents.
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    command: ["scheduler"]
    environment:
      <<: *orchestrator-env
      SCHEDULER_PER_MODE_QUEUE_CAP: "5"
    depends_on:
      - postgres
    restart: unless-stopped

  # Serves bundle zips as static files and accepts uploads via WebDAV PUT.
  file-server:
    image: nginx:alpine
    container_name: snake-arena-files
    restart: unless-stopped
    # Pre-create top-level bucket dirs so create_full_put_path only needs to
    # create one level deep (the per-job/match subdirectory).
    command: ["/bin/sh", "-c", "mkdir -p /srv/files/matches /srv/files/test-matches && chown -R nginx:nginx /srv/files && exec nginx -g 'daemon off;'"]
    volumes:
      - ./sim-artifacts:/srv/files
      - ./nginx-files.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:8081:80"
