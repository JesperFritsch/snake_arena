server {
    listen 80;

    root /srv/files;
    autoindex off;

    # Allow the frontend dev server (and any localhost origin) to fetch bundles.
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    location / {
        # Serve reads to the browser.
        try_files $uri =404;
    }

    # Upload endpoint — only reachable inside the Docker network (127.0.0.1:8081
    # is not exposed publicly). Orchestrator services PUT bundles here;
    # nginx writes them to /srv/files and serves them as static files.
    location /upload/ {
        # Strip the /upload/ prefix so PUT /upload/matches/x/bundle.zip
        # writes to /srv/files/matches/x/bundle.zip.
        alias /srv/files/;

        dav_methods     PUT DELETE;
        create_full_put_path on;
        dav_access      all:rw;

        # No CORS needed here — only server-side callers reach this path.
        limit_except PUT DELETE {
            deny all;
        }
    }

    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
